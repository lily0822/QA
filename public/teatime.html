      border: 1px solid #ffe4e6;

      border: 1px solid #fecdd3;
      background: #fff;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .cute-input:focus {
      border-color: #f472b6;
      box-shadow: 0 0 0 4px rgba(244, 114, 182, .16);
    }
  </style>
</head>

    function showToast(message) {

      render();

      showToast.timer = window.setTimeout(() => {

    function generatedImageUrl(item) {
      const palettes = [
        ["#fff1f2", "#f9a8d4", "#db2777"],
        ["#fef3c7", "#fbbf24", "#b45309"],
        ["#ecfdf5", "#6ee7b7", "#047857"],
        ["#eff6ff", "#93c5fd", "#1d4ed8"],
        ["#f5f3ff", "#c4b5fd", "#7c3aed"]
      ];
      const lock = [...`${item.id}${item.name}`].reduce((sum, char) => sum + char.charCodeAt(0), 0);
      const [bg, accent, text] = palettes[lock % palettes.length];
      const shortName = String(item.name || "飲品").slice(0, 8);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
          <rect width="640" height="480" rx="42" fill="${bg}"/>
          <circle cx="115" cy="90" r="46" fill="#fff" opacity=".65"/>
          <circle cx="530" cy="382" r="70" fill="#fff" opacity=".55"/>
          <path d="M242 148h156l-22 230a42 42 0 0 1-42 38h-28a42 42 0 0 1-42-38z" fill="#fff" stroke="${accent}" stroke-width="14" stroke-linejoin="round"/>
          <path d="M262 206h116l-13 138a30 30 0 0 1-30 27h-30a30 30 0 0 1-30-27z" fill="${accent}" opacity=".72"/>
          <path d="M294 65h86" stroke="${text}" stroke-width="16" stroke-linecap="round"/>
          <path d="M350 72l-28 92" stroke="${text}" stroke-width="14" stroke-linecap="round"/>
          <circle cx="301" cy="333" r="10" fill="${text}" opacity=".65"/>
          <circle cx="334" cy="342" r="10" fill="${text}" opacity=".65"/>
          <circle cx="316" cy="364" r="10" fill="${text}" opacity=".65"/>
          <text x="320" y="104" text-anchor="middle" font-family="Noto Sans TC, Arial, sans-serif" font-size="34" font-weight="900" fill="${text}">${shortName}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function waitForSyncReady(timeoutMs = 7000) {
      if (state.syncStatus === "online" && state.db && state.user) return Promise.resolve(true);
      return new Promise(resolve => {
        const startedAt = Date.now();
        const timer = window.setInterval(() => {
          if (state.syncStatus === "online" && state.db && state.user) {
            window.clearInterval(timer);
            resolve(true);
          } else if (Date.now() - startedAt > timeoutMs) {
            window.clearInterval(timer);
            resolve(false);
          }
        }, 200);
      });
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function buildDrink(id, name, price, description, additions = []) {
      return {

          iceOptions: ["去冰", "微冰", "少冰", "正常冰", "熱"],
          additions: [
            { name: "珍珠", price: 10 },
            { name: "椰果", price: 10 },
            { name: "仙草凍", price: 10 },
            ...additions

        }
      };
    }

                  buildDrink("milksha-002", "珍珠紅茶拿鐵", 75, "經典珍珠鮮奶茶，午後安全牌。", [{ name: "布丁", price: 15 }]),
                  buildDrink("milksha-003", "伯爵紅茶拿鐵", 70, "佛手柑茶香，適合微糖。", [{ name: "小芋圓", price: 15 }])

              }

        },
        {

              {

                items: [
                  buildDrink("chingshin-001", "烏龍綠茶", 30, "清爽順口，清心經典。"),

      if (found) return found.menu;

      return {

          {

    async function fetchRestaurantMenu() {
      const query = state.restaurantQuery.trim();
      if (!query) {
        showToast("請先輸入店家名稱");
        return;
      }
      const canSync = await waitForSyncReady();
      if (!canSync) {
        showToast("同步還沒連上，請確認 Firebase 匿名登入和 Firestore 已開啟");
        return;
      }
      const nextMenu = menuForRestaurant(query);
      nextMenu.categories.forEach(category => {
        category.items.forEach(item => {
          item.imageUrl = generatedImageUrl(item);
        });
      });
      state.activeCategory = "all";
      state.search = "";
      state.menu = nextMenu;
      state.orders = [];
      render();
      try {
        await updateRoom({ menu: nextMenu, orders: [], restaurantName: nextMenu.restaurantName });
        showToast(`已同步 ${nextMenu.restaurantName} 菜單`);
      } catch (error) {
        showToast("菜單沒有同步成功，請檢查 Firestore 權限");
      }
    }

    async function updateRoom(patch) {
      if (!state.db || !state.user || state.syncStatus !== "online") {
        Object.assign(state, patch);
        render();
        return;
      }
      const roomRef = doc(state.db, "teatimeRooms", state.roomId);
      try {
        await updateDoc(roomRef, { ...patch, updatedAt: Date.now() });
      } catch (error) {
        console.error("Room update failed:", error);
        state.syncStatus = "error";
        state.syncError = "同步寫入失敗，請確認 Firestore 規則允許讀寫。";
        render();
        throw error;
      }
    }

    async function connectFirebase() {
      if (!state.firebaseConfigText.trim()) {
        state.syncStatus = "offline";
        state.syncError = "尚未填 Firebase 設定，因此目前是單機模式。";
        render();
        return;
      }

      try {
        const firebaseConfig = JSON.parse(state.firebaseConfigText);
        const firebaseApp = initializeApp(firebaseConfig, `teatime-${state.roomId}-${Date.now()}`);
        const auth = getAuth(firebaseApp);
        state.db = getFirestore(firebaseApp);
        state.syncStatus = "connecting";
        state.syncError = "";
        render();

        onAuthStateChanged(auth, async (currentUser) => {
          if (!currentUser) return;
          state.user = currentUser;
          await joinRoom();
        });

        await signInAnonymously(auth);
      } catch (error) {
        console.error(error);
        state.syncStatus = "error";
        state.syncError = "Firebase 設定無法使用，請確認 JSON、Authentication 匿名登入、Firestore 規則。";
        render();
      }
    }

    async function joinRoom() {
      const roomRef = doc(state.db, "teatimeRooms", state.roomId);
      const snapshot = await getDoc(roomRef);

      const memberPatch = {
        [`members.${state.user.uid}`]: {
          name: state.profile.name,
          joinedAt: Date.now()
        }
      };

      if (!snapshot.exists()) {
        await setDoc(roomRef, {
          roomId: state.roomId,
          menu: state.menu,
          orders: [],
          deliveryFee: state.deliveryFee,
          splitMode: state.splitMode,
          members: {
            [state.user.uid]: {
              name: state.profile.name,
              joinedAt: Date.now()
            }
          },
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
      } else {
        await updateDoc(roomRef, memberPatch);
      }

      if (state.unsubscribe) state.unsubscribe();
      state.unsubscribe = onSnapshot(roomRef, (docSnap) => {
        if (!docSnap.exists()) return;
        const data = docSnap.data();
        state.menu = data.menu || state.menu;
        state.orders = data.orders || [];
        state.deliveryFee = Number(data.deliveryFee || 0);
        state.splitMode = data.splitMode || "byOrder";
        state.syncStatus = "online";
        state.syncError = "";
        render();
      }, (error) => {
        console.error(error);
        state.syncStatus = "error";
        state.syncError = "同步中斷，請檢查 Firestore 權限。";
        render();
      });
    }

    function filteredItems() {
      return allItems().filter(item => {
        const matchCategory = state.activeCategory === "all" || item.categoryName === state.activeCategory;
        const query = state.search.trim().toLowerCase();
        const matchQuery = !query || `${item.name} ${item.description} ${item.categoryName}`.toLowerCase().includes(query);
        return matchCategory && matchQuery;
      });
    }

    function openModal(itemId) {
      const item = allItems().find(entry => entry.id === itemId);
      if (!item) return;
      state.selectedItem = item;
      state.selectedSugar = item.specs?.sugarOptions?.[0] || "";
      state.selectedIce = item.specs?.iceOptions?.[0] || "";
      state.selectedAdditions = [];
      state.selectedQty = 1;
      render();
    }

    function closeModal() {
      state.selectedItem = null;
      render();
    }

    async function addOrder() {
      const item = state.selectedItem;
      if (!item) return;

      const nextOrder = {
        id: uid(),
        userId: state.user?.uid || `local-${state.profile.name}`,
        userName: state.profile.name,
        itemId: item.id,
        itemName: item.name,
        price: item.price,
        imageUrl: item.imageUrl || generatedImageUrl(item),
        sugar: state.selectedSugar,
        ice: state.selectedIce,
        additions: state.selectedAdditions,
        quantity: state.selectedQty,
        createdAt: Date.now()
      };

      const nextOrders = [...state.orders, nextOrder];
      state.selectedItem = null;
      await updateRoom({ orders: nextOrders });
      showToast("已加入團購清單");
    }

    async function removeOrder(orderId) {
      const order = state.orders.find(entry => entry.id === orderId);
      const canRemove = order && (order.userName === state.profile.name || !state.db);
      if (!canRemove) {
        showToast("只能刪除自己的餐點");
        return;
      }
      await updateRoom({ orders: state.orders.filter(entry => entry.id !== orderId) });
      showToast("已移除餐點");
    }

    async function updateMenuImage(itemId) {
      const nextMenu = structuredClone(state.menu);
      for (const category of nextMenu.categories) {
        const item = category.items.find(entry => entry.id === itemId);
        if (item) {
          item.imageUrl = generatedImageUrl(item);
          break;
        }
      }
      await updateRoom({ menu: nextMenu });
      showToast("已抓取餐點圖片");
    }

    function groupedOrders() {
      return memberNames().map(name => {
        const orders = state.orders.filter(order => order.userName === name);
        return {
          name,
          orders,
          subtotal: orders.reduce((sum, order) => sum + itemSubtotal(order), 0)
        };
      });
    }

    function deliveryShare(subtotal) {
      if (!state.orders.length || !state.deliveryFee) return 0;
      if (state.splitMode === "equal") {
        return Math.round(state.deliveryFee / Math.max(memberNames().length, 1));
      }
      return Math.round((subtotal / Math.max(orderTotal(), 1)) * state.deliveryFee);
    }

    function copySummary() {
      const lines = groupedOrders().map(group => {
        const share = deliveryShare(group.subtotal);
        const detail = group.orders.map(order => {
          const specs = [order.sugar, order.ice, ...order.additions.map(add => add.name)].filter(Boolean).join(" / ");
          return `  - ${order.itemName} x${order.quantity}${specs ? ` (${specs})` : ""}: ${money(itemSubtotal(order))}`;
        }).join("\n");
        return `${group.name}: ${money(group.subtotal + share)}\n${detail}\n  運費: ${money(share)}`;
      }).join("\n\n");

      const text = `${state.menu.restaurantName} 團購清單\n房間：${state.roomId}\n\n${lines}\n\n總計：${money(orderTotal() + Number(state.deliveryFee || 0))}`;
      navigator.clipboard?.writeText(text).then(() => showToast("結帳明細已複製"), () => showToast("瀏覽器不允許複製，請手動選取"));
    }

    function renderEntry() {
      return `
        <main class="cute-shell min-h-screen grid lg:grid-cols-[1.05fr_0.95fr]">
          <section class="px-5 py-8 sm:px-10 lg:px-14 xl:px-20 flex items-center">
            <div class="max-w-2xl w-full">
              <div class="inline-flex items-center gap-2 rounded-full border border-pink-100 bg-white px-4 py-2 text-xs font-black text-pink-500 shadow-sm">
                <i data-lucide="cup-soda" class="h-4 w-4"></i>
                下午茶團購點餐
              </div>
              <h1 class="mt-5 text-4xl sm:text-5xl font-black tracking-normal text-slate-900">今天喝什麼，大家一起同步點。</h1>
              <p class="mt-4 text-base leading-7 text-slate-500">輸入名字和房間代碼後進入點餐，同一個房間的人會即時同步訂單、菜單與運費。</p>

              <div class="cute-card mt-8 p-4 sm:p-5">
                <label class="text-sm font-black text-slate-700" for="nameInput">你的名字</label>
                <div class="mt-2 flex flex-col sm:flex-row gap-2">
                  <input id="nameInput" value="${escapeAttr(state.profile.name)}" class="cute-input min-h-11 flex-1 px-4" placeholder="例如 Lily" />
                  <button id="enterBtn" class="cute-btn min-h-11 px-6 font-black inline-flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="h-4 w-4"></i>
                    進入點餐
                  </button>
                </div>
              </div>

              <div class="cute-card mt-4 p-4">
                <label class="grid gap-2 text-sm font-black text-slate-700">
                  點餐房間
                  <input id="roomInput" value="${escapeAttr(state.roomId)}" class="cute-input min-h-10 px-4 font-normal" placeholder="office-teatime" />
                </label>
                <p class="mt-2 text-xs leading-5 text-slate-400">同一個房間代碼會看到同一份訂單。</p>
              </div>
            </div>
          </section>
          <section class="hidden lg:block relative overflow-hidden">
            <img class="absolute inset-0 h-full w-full object-cover" alt="飲料與甜點" src="https://images.unsplash.com/photo-1558857563-b371033873b8?auto=format&fit=crop&w=1300&q=85" />
            <div class="absolute inset-0 bg-pink-500/10"></div>
          </section>
        </main>
      `;
    }

    function renderApp() {
      const categories = ["all", ...state.menu.categories.map(category => category.categoryName)];
      const currentItems = filteredItems();
      const syncBadge = {
        online: "bg-pink-100 text-pink-700",
        connecting: "bg-amber-100 text-amber-800",
        offline: "bg-rose-100 text-rose-500",
        error: "bg-red-100 text-red-700"
      }[state.syncStatus] || "bg-rose-100 text-rose-500";

      return `
        <div class="cute-shell min-h-screen">
          <header class="sticky top-0 z-30 border-b border-pink-100 bg-white/90 backdrop-blur">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <div class="flex items-center gap-2">
                    <h1 class="text-xl font-black text-slate-900">${state.menu.restaurantName}</h1>
                    <span class="rounded-full px-2 py-1 text-[11px] font-black ${syncBadge}">${state.syncStatus === "online" ? "同步中" : state.syncStatus === "connecting" ? "連線中" : state.syncStatus === "error" ? "同步錯誤" : "單機模式"}</span>
                  </div>
                  <p class="mt-1 text-xs text-slate-400">房間：${state.roomId} · 使用者：${state.profile.name}</p>
                </div>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="copySummaryBtn" class="h-10 rounded-full border border-pink-100 bg-white px-4 text-sm font-black text-pink-600 hover:bg-pink-50 inline-flex items-center gap-2 shadow-sm">
                  <i data-lucide="copy" class="h-4 w-4"></i>
                  複製明細
                </button>
              </div>
            </div>
          </header>

          <main class="mx-auto max-w-7xl px-4 sm:px-6 py-5 grid gap-5 lg:grid-cols-[minmax(0,1fr)_390px]">
            <section class="min-w-0">
              ${state.syncError ? `<div class="mb-4 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-bold text-red-700">${state.syncError}</div>` : ""}
              <div class="cute-card mb-5 p-4 sm:p-5">
                <label class="text-sm font-black text-slate-700" for="restaurantInput">今天訂哪家？</label>
                <div class="mt-2 flex flex-col sm:flex-row gap-2">
                  <input id="restaurantInput" value="${escapeAttr(state.restaurantQuery)}" class="cute-input min-h-11 flex-1 px-4" placeholder="例如 迷客夏、五十嵐、龜記、清心" />
                  <button id="fetchRestaurantBtn" class="cute-btn min-h-11 px-6 font-black inline-flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="h-4 w-4"></i>
                    抓菜單
                  </button>
                </div>
                <p class="mt-2 text-xs leading-5 text-slate-400">抓到的新菜單會同步給同一個房間的人，並清空舊訂單。</p>
              </div>
              <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-thin">
                  ${categories.map(category => `
                    <button data-category="${escapeAttr(category)}" class="categoryBtn shrink-0 h-10 rounded-full px-4 text-sm font-black transition shadow-sm ${state.activeCategory === category ? "bg-pink-500 text-white" : "bg-white border border-pink-100 text-pink-500 hover:bg-pink-50"}">
                      ${category === "all" ? "全部" : category}
                    </button>
                  `).join("")}
                </div>
                <div class="relative md:w-72">
                  <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-pink-300"></i>
                  <input id="searchInput" value="${escapeAttr(state.search)}" class="cute-input h-10 w-full pl-9 pr-3" placeholder="搜尋餐點" />
                </div>
              </div>

              <div class="mt-5 grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
                ${currentItems.map(item => `
                  <article class="overflow-hidden rounded-3xl border border-pink-100 bg-white shadow-[0_18px_45px_rgba(244,63,94,.10)]">
                    <div class="relative aspect-[4/3] bg-rose-100">
                      <img class="h-full w-full object-cover" alt="${escapeAttr(item.name)}" src="${escapeAttr(item.imageUrl || generatedImageUrl(item))}" loading="lazy" />
                      <button data-image-id="${escapeAttr(item.id)}" class="imageBtn absolute right-2 top-2 h-9 w-9 rounded-full bg-white/90 text-pink-500 shadow inline-flex items-center justify-center hover:bg-white" title="抓取餐點圖片">
                        <i data-lucide="image-plus" class="h-4 w-4"></i>
                      </button>
                    </div>
                    <div class="p-4">
                      <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                          <h2 class="font-black text-slate-900">${item.name}</h2>
                          <p class="mt-1 text-xs font-bold text-pink-400">${item.categoryName}</p>
                        </div>
                        <span class="shrink-0 rounded-full bg-rose-50 px-2.5 py-1 text-sm font-black text-pink-600">${money(item.price)}</span>
                      </div>
                      <p class="mt-3 min-h-10 text-sm leading-5 text-slate-500">${item.description || "沒有備註"}</p>
                      <button data-order-id="${escapeAttr(item.id)}" class="orderBtn cute-btn mt-4 h-10 w-full px-3 text-sm font-black inline-flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="h-4 w-4"></i>
                        我要點
                      </button>
                    </div>
                  </article>
                `).join("") || `<div class="rounded-3xl border border-pink-100 bg-white p-8 text-center text-sm font-bold text-slate-400 sm:col-span-2 xl:col-span-3">找不到符合的餐點</div>`}
              </div>
            </section>

            <aside class="lg:sticky lg:top-[88px] lg:self-start">
              <div class="rounded-3xl border border-pink-100 bg-white shadow-[0_18px_45px_rgba(244,63,94,.10)]">
                <div class="border-b border-pink-100 p-4">
                  <div class="flex items-center justify-between">
                    <h2 class="font-black text-slate-900">目前訂單</h2>
                    <span class="rounded-full bg-pink-50 px-3 py-1 text-sm font-black text-pink-600">${money(orderTotal() + Number(state.deliveryFee || 0))}</span>
                  </div>
                  <div class="mt-3 grid grid-cols-[1fr_auto] gap-2">
                    <label class="grid gap-1 text-xs font-black text-slate-500">
                      運費
                      <input id="deliveryInput" type="number" min="0" value="${state.deliveryFee}" class="cute-input h-10 px-3 text-sm font-bold text-slate-800" />
                    </label>
                    <label class="grid gap-1 text-xs font-black text-slate-500">
                      分攤
                      <select id="splitSelect" class="cute-input h-10 px-2 text-sm font-bold text-slate-800">
                        <option value="byOrder" ${state.splitMode === "byOrder" ? "selected" : ""}>依金額</option>
                        <option value="equal" ${state.splitMode === "equal" ? "selected" : ""}>平均</option>
                      </select>
                    </label>
                  </div>
                </div>

                <div class="max-h-[calc(100vh-250px)] overflow-y-auto p-4 scrollbar-thin">
                  ${groupedOrders().map(group => {
                    const share = deliveryShare(group.subtotal);
                    return `
                      <section class="mb-5 last:mb-0">
                        <div class="mb-2 flex items-center justify-between">
                          <h3 class="text-sm font-black text-slate-900">${group.name}</h3>
                          <span class="text-xs font-black text-pink-500">小計 ${money(group.subtotal + share)}</span>
                        </div>
                        <div class="space-y-2">
                          ${group.orders.map(order => `
                            <div class="rounded-2xl border border-pink-100 bg-rose-50/60 p-3">
                              <div class="flex gap-3">
                                <img src="${escapeAttr(order.imageUrl)}" alt="${escapeAttr(order.itemName)}" class="h-14 w-14 rounded-2xl object-cover bg-rose-100" />
                                <div class="min-w-0 flex-1">
                                  <div class="flex items-start justify-between gap-2">
                                    <p class="font-black text-sm text-slate-900">${order.itemName} x${order.quantity}</p>
                                    <button data-remove-id="${escapeAttr(order.id)}" class="removeBtn h-7 w-7 shrink-0 rounded-full hover:bg-white inline-flex items-center justify-center text-pink-400" title="刪除">
                                      <i data-lucide="trash-2" class="h-4 w-4"></i>
                                    </button>
                                  </div>
                                  <p class="mt-1 text-xs leading-5 text-slate-500">${[order.sugar, order.ice, ...order.additions.map(add => add.name)].filter(Boolean).join(" / ") || "無規格"}</p>
                                  <p class="mt-1 text-xs font-black text-pink-600">${money(itemSubtotal(order))}</p>
                                </div>
                              </div>
                            </div>
                          `).join("")}
                        </div>
                        ${state.deliveryFee ? `<p class="mt-2 text-right text-xs font-bold text-slate-400">運費 ${money(share)}</p>` : ""}
                      </section>
                    `;
                  }).join("") || `<div class="rounded-2xl border border-dashed border-pink-200 p-6 text-center text-sm font-bold text-slate-400">還沒有人點餐</div>`}
                </div>
              </div>
            </aside>
          </main>

          ${renderItemModal()}
          ${state.toast ? `<div class="fixed bottom-5 left-1/2 z-50 -translate-x-1/2 rounded-full bg-pink-500 px-4 py-2 text-sm font-black text-white shadow-lg">${state.toast}</div>` : ""}
        </div>
      `;
    }

    function renderItemModal() {
      const item = state.selectedItem;
      if (!item) return "";
      const additionsTotal = state.selectedAdditions.reduce((sum, add) => sum + add.price, 0);
      const total = (item.price + additionsTotal) * state.selectedQty;

      return `
        <div class="fixed inset-0 z-40 flex items-end justify-center bg-slate-900/35 p-3 sm:items-center">
          <div class="w-full max-w-md rounded-3xl bg-white shadow-2xl border border-pink-100">
            <div class="flex items-start justify-between border-b border-pink-100 p-4">
              <div>
                <h2 class="font-black text-slate-900">${item.name}</h2>
                <p class="mt-1 text-sm font-bold text-pink-600">${money(item.price)}</p>
              </div>
              <button id="closeModalBtn" class="h-9 w-9 rounded-full text-pink-400 hover:bg-pink-50 inline-flex items-center justify-center" title="關閉">
                <i data-lucide="x" class="h-4 w-4"></i>
              </button>
            </div>
            <div class="max-h-[65vh] overflow-y-auto p-4 scrollbar-thin">
              ${renderChoiceGroup("甜度", "sugarChoice", item.specs?.sugarOptions || [], state.selectedSugar)}
              ${renderChoiceGroup("冰塊", "iceChoice", item.specs?.iceOptions || [], state.selectedIce)}
              ${(item.specs?.additions || []).length ? `
                <section class="mt-4">
                  <h3 class="mb-2 text-sm font-black text-slate-700">加料</h3>
                  <div class="grid grid-cols-2 gap-2">
                    ${item.specs.additions.map(add => {
                      const selected = state.selectedAdditions.some(entry => entry.name === add.name);
                      return `
                        <button data-add-name="${escapeAttr(add.name)}" class="additionChoice min-h-11 rounded-2xl border px-3 text-left text-sm font-black ${selected ? "border-pink-400 bg-pink-50 text-pink-700" : "border-pink-100 bg-white text-slate-600 hover:bg-rose-50"}">
                          ${add.name} <span class="text-xs text-slate-400">+${money(add.price)}</span>
                        </button>
                      `;
                    }).join("")}
                  </div>
                </section>
              ` : ""}
              <section class="mt-4 flex items-center justify-between border-t border-pink-100 pt-4">
                <h3 class="text-sm font-black text-slate-700">數量</h3>
                <div class="flex items-center gap-2">
                  <button id="qtyMinusBtn" class="h-9 w-9 rounded-full border border-pink-100 bg-white font-black text-pink-500 hover:bg-pink-50">-</button>
                  <span class="w-8 text-center font-black">${state.selectedQty}</span>
                  <button id="qtyPlusBtn" class="h-9 w-9 rounded-full border border-pink-100 bg-white font-black text-pink-500 hover:bg-pink-50">+</button>
                </div>
              </section>
            </div>
            <div class="border-t border-pink-100 p-4">
              <button id="addOrderBtn" class="cute-btn h-11 w-full px-4 font-black">加入訂單 · ${money(total)}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderChoiceGroup(title, className, options, selectedValue) {
      if (!options.length) return "";
      return `
        <section class="mt-4 first:mt-0">
          <h3 class="mb-2 text-sm font-black text-slate-700">${title}</h3>
          <div class="flex flex-wrap gap-2">
            ${options.map(option => `
              <button data-choice="${escapeAttr(option)}" class="${className} min-h-10 rounded-full px-4 text-sm font-black ${selectedValue === option ? "bg-pink-500 text-white" : "border border-pink-100 bg-white text-slate-600 hover:bg-rose-50"}">${option}</button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function render() {
      appNode.innerHTML = state.entered ? renderApp() : renderEntry();
      lucide.createIcons();
      bindEvents();
    }

    function bindEvents() {
      const nameInput = document.getElementById("nameInput");
      const firebaseInput = document.getElementById("firebaseInput");
      const roomInput = document.getElementById("roomInput");

      nameInput?.addEventListener("input", (event) => {
        state.profile.name = event.target.value;
      });
      roomInput?.addEventListener("input", (event) => {
        state.roomId = event.target.value.trim() || "office-teatime";
      });
      document.getElementById("enterBtn")?.addEventListener("click", async () => {
        if (!state.profile.name.trim()) {
          showToast("請先輸入名字");
          return;
        }
        state.profile.name = state.profile.name.trim();
        localStorage.setItem(STORAGE_KEYS.profile, JSON.stringify(state.profile));
        localStorage.setItem(STORAGE_KEYS.config, JSON.stringify(DEFAULT_FIREBASE_CONFIG, null, 2));
        localStorage.setItem(STORAGE_KEYS.roomId, state.roomId);
        state.entered = true;
        render();
        await connectFirebase();
      });

      document.querySelectorAll(".categoryBtn").forEach(button => {
        button.addEventListener("click", () => {
          state.activeCategory = button.dataset.category;
          render();
        });
      });
      document.getElementById("searchInput")?.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });
      document.getElementById("restaurantInput")?.addEventListener("input", (event) => {
        state.restaurantQuery = event.target.value;
      });
      document.getElementById("restaurantInput")?.addEventListener("keydown", (event) => {
        if (event.key === "Enter") fetchRestaurantMenu();
      });
      document.getElementById("fetchRestaurantBtn")?.addEventListener("click", fetchRestaurantMenu);
      document.querySelectorAll(".orderBtn").forEach(button => button.addEventListener("click", () => openModal(button.dataset.orderId)));
      document.querySelectorAll(".imageBtn").forEach(button => button.addEventListener("click", () => updateMenuImage(button.dataset.imageId)));
      document.querySelectorAll(".removeBtn").forEach(button => button.addEventListener("click", () => removeOrder(button.dataset.removeId)));
      document.getElementById("deliveryInput")?.addEventListener("change", (event) => updateRoom({ deliveryFee: Number(event.target.value || 0) }));
      document.getElementById("splitSelect")?.addEventListener("change", (event) => updateRoom({ splitMode: event.target.value }));
      document.getElementById("copySummaryBtn")?.addEventListener("click", copySummary);

      document.getElementById("closeModalBtn")?.addEventListener("click", closeModal);
      document.querySelectorAll(".sugarChoice").forEach(button => button.addEventListener("click", () => {
        state.selectedSugar = button.dataset.choice;
        render();
      }));
      document.querySelectorAll(".iceChoice").forEach(button => button.addEventListener("click", () => {
        state.selectedIce = button.dataset.choice;
        render();
      }));
      document.querySelectorAll(".additionChoice").forEach(button => button.addEventListener("click", () => {
        const add = state.selectedItem.specs.additions.find(entry => entry.name === button.dataset.addName);
        const exists = state.selectedAdditions.some(entry => entry.name === add.name);
        state.selectedAdditions = exists ? state.selectedAdditions.filter(entry => entry.name !== add.name) : [...state.selectedAdditions, add];
        render();
      }));
      document.getElementById("qtyMinusBtn")?.addEventListener("click", () => {
        state.selectedQty = Math.max(1, state.selectedQty - 1);
        render();
      });
      document.getElementById("qtyPlusBtn")?.addEventListener("click", () => {
        state.selectedQty += 1;
        render();
      });
      document.getElementById("addOrderBtn")?.addEventListener("click", addOrder);

    }

    render();
  </script>
</body>
</html>
